<!doctype html>
<!--
  Trellis mock — Explorer panel before any folder is connected.

  State shown: the Explorer rail icon is active but no directory handle
  exists yet, so the panel offers only the "Open Folder" button, which
  triggers the browser's window.showDirectoryPicker().

  Reverse-engineered from the Angular components under frontend/src/app/
  (see docs/mocks/README.md for the full mock-to-component mapping).
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Trellis mock — Editor (explorer, no folder)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="assets/mock.css">
</head>
<body>
  <app-root>
    <app-editor-page>
      <div class="editor-page" data-testid="editor-page">

        <app-editor-toolbar>
          <div class="editor-toolbar" data-testid="editor-toolbar" role="toolbar" aria-label="Editor actions" aria-orientation="vertical">
            <div class="editor-toolbar__group">

              <app-rail-button>
                <button type="button" class="rail-button rail-button--active" data-testid="toolbar-explorer" aria-label="Explorer">
                  <svg class="rail-button__icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 9a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z" />
                    <path d="M8 5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-1" />
                  </svg>
                  <span class="rail-button__tooltip" aria-hidden="true">Explorer</span>
                </button>
              </app-rail-button>

              <app-rail-button>
                <button type="button" class="rail-button" data-testid="toolbar-new" aria-label="New">
                  <svg class="rail-button__icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M6 2h7l5 5v13a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zM13 2v5h5" />
                    <path d="M12 14v6M9 17h6" />
                  </svg>
                  <span class="rail-button__tooltip" aria-hidden="true">New</span>
                </button>
              </app-rail-button>

              <app-rail-button>
                <button type="button" class="rail-button" data-testid="toolbar-save" aria-label="Save (Ctrl+S)">
                  <svg class="rail-button__icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 3h11l3 3v15a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" />
                    <path d="M8 3v5h7V3M7 13h10v8H7z" />
                  </svg>
                  <span class="rail-button__tooltip" aria-hidden="true">Save (Ctrl+S)</span>
                </button>
              </app-rail-button>

              <app-rail-button>
                <button type="button" class="rail-button" data-testid="toolbar-upload" aria-label="Upload">
                  <svg class="rail-button__icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 15V4M8 8l4-4 4 4" />
                    <path d="M4 17v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3" />
                  </svg>
                  <span class="rail-button__tooltip" aria-hidden="true">Upload</span>
                </button>
              </app-rail-button>
              <input type="file" class="editor-toolbar__upload-input" data-testid="toolbar-upload-input" accept=".puml,.txt,.plantuml" />

              <app-template-picker>
                <div class="template-picker">
                <app-rail-button>
                  <button type="button" class="rail-button" data-testid="template-picker-toggle" aria-label="Templates">
                    <svg class="rail-button__icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M4 4h6v6H4zM14 4h6v6H14zM4 14h6v6H4zM14 14h6v6H14z" />
                    </svg>
                    <span class="rail-button__tooltip" aria-hidden="true">Templates</span>
                  </button>
                </app-rail-button>
                </div>
              </app-template-picker>

              <app-rail-button>
                <button type="button" class="rail-button" data-testid="documents-panel-toggle" aria-label="Documents">
                  <svg class="rail-button__icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M3 7a1 1 0 0 1 1-1h5l2 2h9a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V7z" />
                  </svg>
                  <span class="rail-button__tooltip" aria-hidden="true">Documents</span>
                </button>
              </app-rail-button>

            </div>

            <div class="editor-toolbar__group editor-toolbar__group--bottom">
              <app-connection-status>
                <span class="connection-status-indicator connection-status-indicator--connected">
                  <span class="connection-status connection-status--connected" data-testid="connection-status">connected</span>
                </span>
              </app-connection-status>
            </div>
          </div>
        </app-editor-toolbar>

        <div class="editor-page__body">

          <!-- Side panel wrapper: both panels stay mounted; only the active one is visible. -->
          <div class="editor-page__side-panel" style="display: flex; width: 260px;">
            <app-explorer-panel>
              <div class="explorer-panel" data-testid="explorer-panel">
                <button type="button" class="explorer-panel__open-folder" data-testid="explorer-open-folder">Open Folder</button>
              </div>
            </app-explorer-panel>
            <app-documents-panel style="display: none;"><!-- [open]=false renders nothing --></app-documents-panel>
          </div>

          <app-pixel-resize-divider>
            <div class="pixel-resize-divider" data-testid="pixel-resize-divider" role="separator" aria-orientation="vertical" tabindex="0"
                 aria-valuenow="260" aria-valuemin="170" aria-valuemax="500" aria-label="Resize side panel">
              <div class="pixel-resize-divider__grab-area"></div>
            </div>
          </app-pixel-resize-divider>

          <div class="editor-page__editor-pane" style="flex-basis: 50%;">
            <app-monaco-editor>
              <div class="monaco-editor-wrapper__surface" data-testid="monaco-editor">
                <!-- mock-only facsimile of the Monaco surface (theme 'vs', language 'plaintext') -->
                <div class="mock-monaco">
                  <div class="mock-monaco__gutter">1</div>
                  <div class="mock-monaco__code"><span class="mock-monaco__cursor"></span></div>
                </div>
              </div>
            </app-monaco-editor>
          </div>

          <app-resize-divider>
            <div class="resize-divider" data-testid="resize-divider" role="separator" aria-orientation="vertical" tabindex="0"
                 aria-valuenow="50" aria-valuemin="20" aria-valuemax="80" aria-label="Resize editor and preview panes">
              <div class="resize-divider__grab-area"></div>
            </div>
          </app-resize-divider>

          <div class="editor-page__preview-pane">
            <app-diagram-preview>
              <div class="diagram-preview" data-testid="preview-pane" data-render-seq="0">
                <div class="diagram-preview__placeholder" data-testid="preview-placeholder">
                  Press Ctrl+Enter in the editor to render your diagram.
                </div>
              </div>
            </app-diagram-preview>
          </div>

        </div>

        <app-save-dialog><!-- hidden: [visible]=false renders nothing --></app-save-dialog>
        <app-error-banner class="editor-page__disk-save-error"><!-- hidden: no disk-save error --></app-error-banner>

      </div>
    </app-editor-page>
  </app-root>
</body>
</html>
