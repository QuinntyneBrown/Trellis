<div class="documents-list-page">
  <h1 class="documents-list-page__title">Documents</h1>

  @if (isLoading()) {
    <app-loading-spinner></app-loading-spinner>
  } @else if (documents().length === 0) {
    <p class="documents-list-page__empty">No saved documents yet.</p>
  } @else {
    <ul class="documents-list-page__list">
      @for (document of documents(); track document.id) {
        <app-document-list-item
          [document]="document"
          (open)="onOpen($event)"
          (delete)="onDelete($event)"
          (rename)="onRename($event)"
        ></app-document-list-item>
      }
    </ul>
  }
</div>
