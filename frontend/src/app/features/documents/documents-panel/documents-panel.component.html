@if (open) {
  <aside class="documents-panel" data-testid="documents-panel">
    <div class="documents-panel__header">
      <span class="documents-panel__header-title">Documents</span>
      <app-tree-action-button
        icon="new-folder"
        label="New Folder"
        testId="documents-new-folder"
        (clicked)="onHeaderNewFolderClicked()"
      />
    </div>

    @if (scopedFolder(); as scoped) {
      <div class="documents-panel__scope-bar" data-testid="documents-scope-bar">
        <app-tree-action-button
          icon="up"
          label="Up one level"
          testId="documents-scope-up"
          (clicked)="onScopeUp()"
        />
        <span
          class="documents-panel__scope-name"
          data-testid="documents-scope-name"
          [attr.data-folder-name]="scoped.name"
          [title]="scoped.name"
          >{{ scoped.name }}</span
        >
        <app-tree-action-button
          icon="clear"
          label="Show all documents"
          testId="documents-scope-clear"
          (clicked)="onScopeClear()"
        />
      </div>
    }

    @if (tree().length === 0) {
      <p class="documents-panel__empty">{{ scopedFolder() ? 'This folder is empty.' : 'No saved documents yet.' }}</p>
    } @else {
      <div
        class="documents-panel__tree"
        data-testid="documents-tree"
        [class.documents-panel__tree--drop-target]="isRootDragOver"
        (dragenter)="onRootDragEnter($event)"
        (dragover)="onRootDragOver($event)"
        (dragleave)="onRootDragLeave()"
        (drop)="onRootDrop($event)"
      >
        @for (node of tree(); track node.id) {
          <app-document-tree-node
            [node]="node"
            [depth]="0"
            [activeDocumentId]="activeDocumentId"
            (toggleExpand)="onToggleExpand($event)"
            (openDocument)="onOpenDocument($event)"
            (createFolder)="onCreateFolder($event)"
            (renameNode)="onRenameNode($event)"
            (deleteNode)="onDeleteNode($event)"
            (moveDocument)="onMoveDocumentDropped($event)"
            (moveRequested)="onMoveRequested($event)"
            (scopeRequested)="onScopeToFolder($event)"
          ></app-document-tree-node>
        }
      </div>
    }

    <app-move-document-dialog
      [visible]="movingDocument() !== null"
      [documentName]="movingDocument()?.name ?? ''"
      [folders]="folderList()"
      [currentFolderId]="movingDocument()?.document?.folderId ?? null"
      (confirm)="onMoveDialogConfirm($event)"
      (cancel)="onMoveDialogCancel()"
    />
  </aside>
}
