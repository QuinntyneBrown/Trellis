<div class="document-tree-node">
  @if (node.kind === 'folder') {
    <div
      class="document-tree-node__row document-tree-node__row--folder"
      data-testid="document-folder"
      [attr.data-folder-name]="node.name"
      [style.padding-left.px]="indentPx"
      [attr.aria-expanded]="node.expanded"
      (click)="onRowClick()"
    >
      <span
        class="document-tree-node__chevron"
        data-testid="document-folder-chevron"
        [class.document-tree-node__chevron--expanded]="node.expanded"
        aria-hidden="true"
      ></span>

      <span class="document-tree-node__name">{{ node.name }}</span>

      <div class="document-tree-node__actions">
        <button
          type="button"
          class="document-tree-node__action"
          data-testid="document-folder-new-folder"
          title="New Folder"
          (click)="onNewFolderClicked($event)"
        >
          New Folder
        </button>
        <button
          type="button"
          class="document-tree-node__action"
          data-testid="document-folder-rename"
          title="Rename"
          (click)="onRenameClicked($event)"
        >
          Rename
        </button>
        <button
          type="button"
          class="document-tree-node__action document-tree-node__action--danger"
          data-testid="document-folder-delete"
          title="Delete folder and contents"
          (click)="onDeleteClicked($event)"
        >
          Delete
        </button>
      </div>
    </div>
  } @else {
    <div
      class="document-tree-node__row document-tree-node__row--document"
      data-testid="document-item"
      [attr.data-document-name]="node.name"
      [style.padding-left.px]="indentPx"
      [title]="'Updated ' + node.document!.updatedAt"
      (click)="onRowClick()"
    >
      <span class="document-tree-node__chevron-spacer" aria-hidden="true"></span>

      <span class="document-tree-node__name">{{ node.name }}</span>

      <div class="document-tree-node__actions">
        <button
          type="button"
          class="document-tree-node__action"
          data-testid="document-item-open"
          title="Open"
          (click)="onOpenClicked($event)"
        >
          Open
        </button>
        <button
          type="button"
          class="document-tree-node__action"
          data-testid="document-item-rename"
          title="Rename"
          (click)="onRenameClicked($event)"
        >
          Rename
        </button>
        <button
          type="button"
          class="document-tree-node__action document-tree-node__action--danger"
          data-testid="document-item-delete"
          title="Delete"
          (click)="onDeleteClicked($event)"
        >
          Delete
        </button>
      </div>
    </div>
  }

  @if (node.kind === 'folder' && node.expanded) {
    <div class="document-tree-node__children">
      @for (child of node.children; track child.id) {
        <app-document-tree-node
          [node]="child"
          [depth]="depth + 1"
          (toggleExpand)="toggleExpand.emit($event)"
          (openDocument)="openDocument.emit($event)"
          (createFolder)="createFolder.emit($event)"
          (renameNode)="renameNode.emit($event)"
          (deleteNode)="deleteNode.emit($event)"
        ></app-document-tree-node>
      }
    </div>
  }
</div>
