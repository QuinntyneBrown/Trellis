<div class="document-tree-node">
  @if (node.kind === 'folder') {
    <div
      class="document-tree-node__row document-tree-node__row--folder"
      data-testid="document-folder"
      [attr.data-folder-name]="node.name"
      [style.padding-left.px]="indentPx"
      [attr.aria-expanded]="node.expanded"
      [class.document-tree-node__row--drop-target]="isDragOver"
      (click)="onRowClick()"
      (dragenter)="onDragEnter($event)"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
    >
      <span
        class="document-tree-node__chevron"
        data-testid="document-folder-chevron"
        [class.document-tree-node__chevron--expanded]="node.expanded"
        aria-hidden="true"
      ></span>

      <span class="document-tree-node__name">{{ node.name }}</span>

      <div class="document-tree-node__actions">
        <app-tree-action-button
          icon="scope"
          label="Scope to this folder"
          testId="document-folder-scope"
          (clicked)="onScopeClicked($event)"
        />
        <app-tree-action-button
          icon="export"
          label="Export folder as Markdown"
          testId="document-folder-export"
          (clicked)="onExportClicked($event)"
        />
        <app-tree-action-button
          icon="new-folder"
          label="New Folder"
          testId="document-folder-new-folder"
          (clicked)="onNewFolderClicked($event)"
        />
        <app-tree-action-button
          icon="rename"
          label="Rename"
          testId="document-folder-rename"
          (clicked)="onRenameClicked($event)"
        />
        <app-tree-action-button
          icon="delete"
          label="Delete folder and contents"
          testId="document-folder-delete"
          [danger]="true"
          (clicked)="onDeleteClicked($event)"
        />
      </div>
    </div>
  } @else {
    <div
      class="document-tree-node__row document-tree-node__row--document"
      data-testid="document-item"
      [attr.data-document-name]="node.name"
      [style.padding-left.px]="indentPx"
      [title]="'Updated ' + node.document!.updatedAt"
      draggable="true"
      [class.document-tree-node__row--active]="isActive"
      [attr.aria-current]="isActive ? 'true' : null"
      (click)="onRowClick()"
      (dragstart)="onDragStart($event)"
    >
      <span class="document-tree-node__chevron-spacer" aria-hidden="true"></span>

      <span class="document-tree-node__name">{{ node.name }}</span>

      @if (node.document!.kind === 'markdown') {
        <span class="document-tree-node__kind-badge" data-testid="document-kind-badge" aria-label="Markdown document">MD</span>
      }

      <div class="document-tree-node__actions">
        <app-tree-action-button
          icon="move"
          label="Move to Folder…"
          testId="document-item-move"
          (clicked)="onMoveClicked($event)"
        />
        <app-tree-action-button
          icon="open"
          label="Open"
          testId="document-item-open"
          (clicked)="onOpenClicked($event)"
        />
        <app-tree-action-button
          icon="rename"
          label="Rename"
          testId="document-item-rename"
          (clicked)="onRenameClicked($event)"
        />
        <app-tree-action-button
          icon="delete"
          label="Delete"
          testId="document-item-delete"
          [danger]="true"
          (clicked)="onDeleteClicked($event)"
        />
      </div>
    </div>
  }

  @if (node.kind === 'folder' && node.expanded) {
    <div class="document-tree-node__children">
      @for (child of node.children; track child.id) {
        <app-document-tree-node
          [node]="child"
          [depth]="depth + 1"
          [activeDocumentId]="activeDocumentId"
          (toggleExpand)="toggleExpand.emit($event)"
          (openDocument)="openDocument.emit($event)"
          (createFolder)="createFolder.emit($event)"
          (renameNode)="renameNode.emit($event)"
          (deleteNode)="deleteNode.emit($event)"
          (moveDocument)="moveDocument.emit($event)"
          (moveRequested)="moveRequested.emit($event)"
          (scopeRequested)="scopeRequested.emit($event)"
          (exportRequested)="exportRequested.emit($event)"
        ></app-document-tree-node>
      }
    </div>
  }
</div>
