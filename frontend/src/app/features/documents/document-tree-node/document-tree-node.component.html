<div class="document-tree-node">
  @if (node.kind === 'folder') {
    <div
      class="document-tree-node__row document-tree-node__row--folder"
      data-testid="document-folder"
      [attr.data-folder-name]="node.name"
      [style.padding-left.px]="indentPx"
      [attr.aria-expanded]="node.expanded"
      [class.document-tree-node__row--drop-target]="isDragOver"
      [class.document-tree-node__row--context-target]="contextMenuTarget === node"
      aria-haspopup="menu"
      role="treeitem"
      tabindex="0"
      (click)="onRowClick()"
      (contextmenu)="onContextMenu($event)"
      (keydown)="onRowKeydown($event)"
      (dragenter)="onDragEnter($event)"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
    >
      <span
        class="document-tree-node__chevron"
        data-testid="document-folder-chevron"
        [class.document-tree-node__chevron--expanded]="node.expanded"
        aria-hidden="true"
      ></span>

      <span class="document-tree-node__name">{{ node.name }}</span>
    </div>
  } @else {
    <div
      class="document-tree-node__row document-tree-node__row--document"
      data-testid="document-item"
      [attr.data-document-name]="node.name"
      [style.padding-left.px]="indentPx"
      [title]="'Updated ' + node.document!.updatedAt"
      draggable="true"
      [class.document-tree-node__row--active]="isActive"
      [class.document-tree-node__row--excluded]="node.document!.excludedFromExport"
      [class.document-tree-node__row--context-target]="contextMenuTarget === node"
      [attr.aria-current]="isActive ? 'true' : null"
      aria-haspopup="menu"
      role="treeitem"
      tabindex="0"
      (click)="onRowClick()"
      (contextmenu)="onContextMenu($event)"
      (keydown)="onRowKeydown($event)"
      (dragstart)="onDragStart($event)"
    >
      <span class="document-tree-node__chevron-spacer" aria-hidden="true"></span>

      <span class="document-tree-node__name">{{ node.name }}</span>

      @if (node.document!.kind === 'markdown') {
        <span class="document-tree-node__kind-badge" data-testid="document-kind-badge" aria-label="Markdown document">MD</span>
      }

      @if (node.document!.excludedFromExport) {
        <span class="document-tree-node__excluded-badge" data-testid="document-excluded-badge" aria-label="Excluded from export">no export</span>
      }
    </div>
  }

  @if (node.kind === 'folder' && node.expanded) {
    <div class="document-tree-node__children" role="group">
      @for (child of node.children; track child.id) {
        <app-document-tree-node
          [node]="child"
          [depth]="depth + 1"
          [activeDocumentId]="activeDocumentId"
          [contextMenuTarget]="contextMenuTarget"
          (toggleExpand)="toggleExpand.emit($event)"
          (openDocument)="openDocument.emit($event)"
          (moveDocument)="moveDocument.emit($event)"
          (contextMenuRequested)="contextMenuRequested.emit($event)"
        ></app-document-tree-node>
      }
    </div>
  }
</div>
