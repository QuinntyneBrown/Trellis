<div
  class="editor-toolbar"
  data-testid="editor-toolbar"
  role="toolbar"
  aria-label="Editor actions"
  aria-orientation="vertical"
>
  <div class="editor-toolbar__group">
    <app-rail-button icon="new" label="New" testId="toolbar-new" (clicked)="onNewClicked()"></app-rail-button>

    <app-rail-button
      icon="save"
      label="Save"
      shortcut="Ctrl+S"
      testId="toolbar-save"
      (clicked)="onSaveClicked()"
    ></app-rail-button>

    <app-rail-button
      icon="upload"
      label="Upload"
      testId="toolbar-upload"
      (clicked)="onUploadClicked()"
    ></app-rail-button>
    <input
      #fileInput
      type="file"
      class="editor-toolbar__upload-input"
      data-testid="toolbar-upload-input"
      accept=".puml,.txt,.plantuml"
      (change)="onFileInputChange($event)"
    />

    <app-template-picker (templateSelected)="onTemplateSelected($event)"></app-template-picker>

    <app-rail-button
      icon="documents"
      label="Documents"
      testId="documents-panel-toggle"
      (clicked)="onDocumentsPanelToggleClicked()"
    ></app-rail-button>
  </div>

  <div class="editor-toolbar__group editor-toolbar__group--bottom">
    <app-connection-status [state]="connectionState"></app-connection-status>
  </div>
</div>
