<div
  class="editor-toolbar"
  data-testid="editor-toolbar"
  role="toolbar"
  aria-label="Editor actions"
  aria-orientation="vertical"
>
  <div class="editor-toolbar__group">
    @if (explorerSupported) {
      <app-rail-button
        icon="explorer"
        label="Explorer"
        testId="toolbar-explorer"
        [active]="activeSidePanel === 'explorer'"
        (clicked)="explorerPanelToggle.emit()"
      ></app-rail-button>
    }

    <app-rail-button
      icon="templates"
      label="Templates"
      testId="templates-panel-toggle"
      [active]="activeSidePanel === 'templates'"
      (clicked)="templatesPanelToggle.emit()"
    ></app-rail-button>

    <app-rail-button
      icon="documents"
      label="Documents"
      testId="documents-panel-toggle"
      [active]="activeSidePanel === 'documents'"
      (clicked)="documentsPanelToggle.emit()"
    ></app-rail-button>
  </div>

  <div class="editor-toolbar__group editor-toolbar__group--bottom">
    <app-connection-status [state]="connectionState"></app-connection-status>
  </div>
</div>
