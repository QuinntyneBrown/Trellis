<div class="title-bar" data-testid="title-bar" role="banner">
  <!-- Empty spacer: the app menus live behind the rail's hamburger
       (vscode.dev-style), but the region keeps its flex share so the
       command center stays centered. -->
  <div class="title-bar__left"></div>

  <div class="title-bar__center">
    <button type="button" class="title-bar__command-center" data-testid="title-bar-command-center" aria-label="Search documents">
      <svg class="title-bar__search-icon" viewBox="0 0 16 16" aria-hidden="true">
        <circle cx="7" cy="7" r="4.5" />
        <path d="M10.6 10.6 14 14" />
      </svg>
      <span class="title-bar__title" data-testid="title-bar-title">{{ windowTitle }}</span>
    </button>
    <button
      type="button"
      class="title-bar__copy-button"
      data-testid="title-bar-copy-contents"
      title="Copy document contents"
      aria-label="Copy document contents"
      (click)="copyContents.emit()"
    >
      @if (copied) {
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 8.5l3.5 3.5L13 4.5" /></svg>
      } @else {
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <rect x="5.5" y="5.5" width="8" height="8" rx="1" />
          <path d="M10.5 3.5H4A1.5 1.5 0 0 0 2.5 5v6.5" />
        </svg>
      }
    </button>
  </div>

  <div class="title-bar__right">
    <div class="title-bar__layout-controls">
      <button
        type="button"
        class="title-bar__layout-toggle"
        [class.title-bar__layout-toggle--active]="sidePanelOpen"
        data-testid="title-bar-sidebar-toggle"
        title="Toggle Primary Side Bar"
        aria-label="Toggle Primary Side Bar"
        (click)="sidebarToggle.emit()"
      >
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <rect class="title-bar__pane-fill" x="2" y="3.5" width="4" height="9.5" />
          <rect x="2" y="3.5" width="12" height="9.5" rx="1" />
          <path d="M6 3.5v9.5" />
        </svg>
      </button>
      <button type="button" class="title-bar__layout-toggle" title="Toggle Panel" aria-label="Toggle Panel">
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <rect class="title-bar__pane-fill" x="2" y="9.5" width="12" height="3.5" />
          <rect x="2" y="3.5" width="12" height="9.5" rx="1" />
          <path d="M2 9.5h12" />
        </svg>
      </button>
      <button type="button" class="title-bar__layout-toggle" title="Toggle Secondary Side Bar" aria-label="Toggle Secondary Side Bar">
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <rect class="title-bar__pane-fill" x="10" y="3.5" width="4" height="9.5" />
          <rect x="2" y="3.5" width="12" height="9.5" rx="1" />
          <path d="M10 3.5v9.5" />
        </svg>
      </button>
    </div>
    <div class="title-bar__window-controls">
      <button type="button" class="title-bar__window-control" aria-label="Minimize">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 8.5h10" /></svg>
      </button>
      <button type="button" class="title-bar__window-control" aria-label="Maximize">
        <svg viewBox="0 0 16 16" aria-hidden="true"><rect x="3" y="3.5" width="10" height="9.5" rx="1" /></svg>
      </button>
      <button type="button" class="title-bar__window-control title-bar__window-control--close" aria-label="Close">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M4 4.5l8 8M12 4.5l-8 8" /></svg>
      </button>
    </div>
  </div>
</div>
