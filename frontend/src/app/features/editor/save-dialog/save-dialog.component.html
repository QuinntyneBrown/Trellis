@if (visible) {
  <div class="save-dialog" data-testid="save-dialog">
    <div class="save-dialog__backdrop" (click)="onCancelClicked()"></div>
    <div class="save-dialog__panel">
      <h2 class="save-dialog__title">{{ heading }}</h2>

      <label class="save-dialog__label" for="save-dialog-name-input">Name</label>
      <input
        id="save-dialog-name-input"
        type="text"
        class="save-dialog__input"
        data-testid="save-dialog-name"
        [ngModel]="name()"
        (ngModelChange)="onNameInput($event)"
      />

      @if (kindSelectionEnabled) {
        <label class="save-dialog__label" for="save-dialog-kind-select">Type</label>
        <select
          id="save-dialog-kind-select"
          class="save-dialog__select"
          data-testid="save-dialog-kind"
          [ngModel]="selectedKind()"
          (ngModelChange)="onKindChange($event)"
        >
          <option value="plantuml">PlantUML</option>
          <option value="markdown">Markdown</option>
        </select>
      }

      @if (folderSelectionEnabled) {
        <label class="save-dialog__label" for="save-dialog-folder-select">Folder</label>
        <select
          id="save-dialog-folder-select"
          class="save-dialog__select"
          data-testid="save-dialog-folder"
          [ngModel]="selectedFolderId() ?? ''"
          (ngModelChange)="onFolderChange($event)"
        >
          <option value="">(No folder)</option>
          @for (option of folderOptions; track option.id) {
            <option [value]="option.id">{{ option.label }}</option>
          }
        </select>
      }

      <div class="save-dialog__actions">
        <button
          type="button"
          class="save-dialog__button save-dialog__button--cancel"
          data-testid="save-dialog-cancel"
          (click)="onCancelClicked()"
        >
          Cancel
        </button>
        <button
          type="button"
          class="save-dialog__button save-dialog__button--confirm"
          data-testid="save-dialog-confirm"
          (click)="onConfirmClicked()"
        >
          Save
        </button>
      </div>
    </div>
  </div>
}
