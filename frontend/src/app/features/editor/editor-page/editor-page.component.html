<div class="editor-page" data-testid="editor-page">
  <app-editor-toolbar
    [connectionState]="hubService.connectionState()"
    [explorerSupported]="explorerSupported"
    [activeSidePanel]="activeSidePanel()"
    (newDocument)="onNewDocument()"
    (save)="onSaveClicked()"
    (fileSelected)="onFileSelected($event)"
    (templateSelected)="onTemplateSelected($event)"
    (explorerPanelToggle)="onExplorerPanelToggle()"
    (documentsPanelToggle)="onDocumentsPanelToggle()"
  ></app-editor-toolbar>

  <div class="editor-page__body">
    <div
      class="editor-page__side-panel"
      [style.display]="activeSidePanel() ? 'flex' : 'none'"
      [style.width.px]="sidePanelWidthPx()"
    >
      <app-explorer-panel
        [style.display]="activeSidePanel() === 'explorer' ? '' : 'none'"
        (fileOpened)="onDiskFileOpened($event)"
      ></app-explorer-panel>
      <app-documents-panel
        [style.display]="activeSidePanel() === 'documents' ? '' : 'none'"
        [open]="activeSidePanel() === 'documents'"
        (documentOpened)="onDocumentOpenedFromPanel($event)"
      ></app-documents-panel>
    </div>

    @if (activeSidePanel()) {
      <app-pixel-resize-divider
        [widthPx]="sidePanelWidthPx()"
        [minWidthPx]="MIN_SIDE_PANEL_WIDTH_PX"
        [maxWidthPx]="MAX_SIDE_PANEL_WIDTH_PX"
        (widthChange)="onSidePanelDividerWidthChange($event)"
        (resizeEnd)="onSidePanelDividerResizeEnd($event)"
      ></app-pixel-resize-divider>
    }

    <div class="editor-page__editor-pane" [style.flex-basis.%]="editorPaneRatioPercent()">
      <app-monaco-editor
        [value]="sourceCode()"
        (valueChange)="onEditorValueChange($event)"
        (renderRequested)="onRenderRequested($event)"
      ></app-monaco-editor>
    </div>

    <app-resize-divider
      [ratio]="editorPaneRatio()"
      [minRatio]="MIN_EDITOR_PANE_RATIO"
      [maxRatio]="MAX_EDITOR_PANE_RATIO"
      (ratioChange)="onDividerRatioChange($event)"
      (resizeEnd)="onDividerResizeEnd($event)"
    ></app-resize-divider>

    <div class="editor-page__preview-pane">
      <app-diagram-preview
        [result]="hubService.renderResult()"
        [isRendering]="hubService.isRendering()"
      ></app-diagram-preview>
    </div>
  </div>

  <app-save-dialog
    [visible]="isSaveDialogOpen()"
    [initialName]="documentName()"
    (confirm)="onSaveConfirm($event)"
    (cancel)="onSaveCancel()"
  ></app-save-dialog>

  <!--
    A fixed-position toast (rather than an in-flow banner squeezed into the
    already-tested editor/preview pane layout) so surfacing a disk-write
    failure can never perturb the existing pane sizing -- shown only while
    diskSaveError() is set (app-error-banner itself already no-ops when
    message is null).
  -->
  <app-error-banner class="editor-page__disk-save-error" [message]="diskSaveError()"></app-error-banner>
</div>
