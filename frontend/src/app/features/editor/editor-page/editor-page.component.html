<app-title-bar
  [documentName]="documentName()"
  [sidePanelOpen]="activeSidePanel() !== null"
  (sidebarToggle)="onTitleBarSidebarToggle()"
  (newDocument)="onNewDocument()"
  (save)="onSaveClicked()"
  (uploadRequested)="onUploadRequested()"
></app-title-bar>
<div class="editor-page" data-testid="editor-page">
  <app-editor-toolbar
    [connectionState]="hubService.connectionState()"
    [explorerSupported]="explorerSupported"
    [activeSidePanel]="activeSidePanel()"
    (newDocument)="onNewDocument()"
    (save)="onSaveClicked()"
    (explorerPanelToggle)="toggleSidePanel('explorer')"
    (documentsPanelToggle)="toggleSidePanel('documents')"
    (templatesPanelToggle)="toggleSidePanel('templates')"
  ></app-editor-toolbar>

  <!-- Hidden target of File > Upload and Ctrl+U; lives here because this
       component owns the upload flow (onFileSelected). -->
  <input
    #uploadInput
    type="file"
    class="editor-page__upload-input"
    data-testid="upload-input"
    accept=".puml,.txt,.plantuml,.md,.markdown"
    (change)="onUploadInputChange($event)"
  />

  <div class="editor-page__body">
    <div
      class="editor-page__side-panel"
      [style.display]="activeSidePanel() ? 'flex' : 'none'"
      [style.width.px]="sidePanelWidthPx()"
    >
      <app-explorer-panel
        [style.display]="activeSidePanel() === 'explorer' ? '' : 'none'"
        (fileOpened)="onDiskFileOpened($event)"
        (fileDeleted)="onDiskFileDeleted($event)"
      ></app-explorer-panel>
      <app-documents-panel
        [style.display]="activeSidePanel() === 'documents' ? '' : 'none'"
        [open]="activeSidePanel() === 'documents'"
        [activeDocumentId]="documentId()"
        (documentOpened)="onDocumentOpenedFromPanel($event)"
      ></app-documents-panel>
      <app-templates-panel
        [style.display]="activeSidePanel() === 'templates' ? '' : 'none'"
        [open]="activeSidePanel() === 'templates'"
        [editorContent]="sourceCode()"
        [editorKind]="documentKind()"
        (templateApplied)="onTemplateApplied($event)"
      ></app-templates-panel>
    </div>

    @if (activeSidePanel()) {
      <app-resize-divider
        [value]="sidePanelWidthPx()"
        [min]="MIN_SIDE_PANEL_WIDTH_PX"
        [max]="MAX_SIDE_PANEL_WIDTH_PX"
        [step]="SIDE_PANEL_WIDTH_KEYBOARD_STEP_PX"
        [resetValue]="DEFAULT_SIDE_PANEL_WIDTH_PX"
        ariaLabel="Resize side panel"
        testId="pixel-resize-divider"
        (valueChange)="sidePanelWidthPx.set($event)"
        (resizeEnd)="onSidePanelDividerResizeEnd($event)"
      ></app-resize-divider>
    }

    <div class="editor-page__editor-pane" [style.flex-basis.%]="editorPaneRatioPercent()">
      <app-monaco-editor
        [value]="sourceCode()"
        [language]="documentKind() === 'markdown' ? 'markdown' : 'plaintext'"
        (valueChange)="sourceCode.set($event)"
        (renderRequested)="hubService.render($event, documentKind())"
      ></app-monaco-editor>
    </div>

    <app-resize-divider
      [value]="editorPaneRatio()"
      [min]="MIN_EDITOR_PANE_RATIO"
      [max]="MAX_EDITOR_PANE_RATIO"
      [step]="EDITOR_PANE_RATIO_KEYBOARD_STEP"
      [resetValue]="DEFAULT_EDITOR_PANE_RATIO"
      [scaleToContainerWidth]="true"
      ariaLabel="Resize editor and preview panes"
      testId="resize-divider"
      (valueChange)="editorPaneRatio.set($event)"
      (resizeEnd)="onDividerResizeEnd($event)"
    ></app-resize-divider>

    <div class="editor-page__preview-pane">
      <app-diagram-preview
        [result]="hubService.renderResult()"
        [isRendering]="hubService.isRendering()"
      ></app-diagram-preview>
    </div>
  </div>

  <app-save-dialog
    [visible]="isSaveDialogOpen()"
    [heading]="saveDialogMode() === 'saveAs' ? 'Save Document As' : 'Save document'"
    [initialName]="documentName()"
    [folders]="saveDialogFolders()"
    [folderSelectionEnabled]="saveDialogMode() === 'saveAs' || !documentId()"
    [kindSelectionEnabled]="saveDialogMode() === 'saveAs' || !documentId()"
    [initialKind]="documentKind()"
    (confirm)="performSave($event.name, $event.folderId, $event.kind)"
    (cancel)="closeSaveDialog()"
  ></app-save-dialog>

  <!--
    A fixed-position toast (rather than an in-flow banner squeezed into the
    already-tested editor/preview pane layout) so surfacing a save/upload/
    open failure can never perturb the existing pane sizing -- shown only
    while saveError() is set (app-error-banner itself already no-ops when
    message is null).
  -->
  <app-error-banner class="editor-page__save-error" [message]="saveError()"></app-error-banner>
</div>
