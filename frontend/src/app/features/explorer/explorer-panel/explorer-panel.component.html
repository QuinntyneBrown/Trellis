@if (isSupported) {
  <div class="explorer-panel" data-testid="explorer-panel" (scroll)="closeContextMenu(false)">
    @if (errorMessage()) {
      <app-error-banner class="explorer-panel__error" [message]="errorMessage()"></app-error-banner>
    }

    @if (isLoading()) {
      <app-loading-spinner class="explorer-panel__loading"></app-loading-spinner>
    } @else if (needsReconnect() && rootNode) {
      <button
        type="button"
        class="explorer-panel__reconnect"
        data-testid="explorer-reconnect"
        (click)="onReconnectClicked()"
      >
        Reconnect to {{ rootNode.name }}
      </button>
    } @else if (rootNode) {
      <div
        class="explorer-panel__tree"
        data-testid="explorer-tree"
        role="tree"
        aria-label="File Explorer"
        aria-haspopup="menu"
        tabindex="0"
        (contextmenu)="onTreeContextMenu($event)"
        (keydown)="onTreeKeydown($event)"
      >
        <app-file-tree-node
          [node]="rootNode"
          [depth]="0"
          [parentNode]="null"
          [contextMenuTarget]="contextMenuRequest()?.target?.node ?? null"
          (toggleExpand)="onToggleExpand($event)"
          (fileClicked)="onFileClicked($event)"
          (contextMenuRequested)="onContextMenuRequested($event)"
        ></app-file-tree-node>
      </div>
    } @else {
      <button
        type="button"
        class="explorer-panel__open-folder"
        data-testid="explorer-open-folder"
        (click)="onOpenFolderClicked()"
      >
        Open Folder
      </button>
    }
  </div>

  @if (contextMenuRequest(); as request) {
    <app-tree-context-menu
      ariaLabel="File Explorer commands"
      [items]="contextMenuItems()"
      [clientX]="request.clientX"
      [clientY]="request.clientY"
      (commandSelected)="onContextMenuCommand($event)"
      (menuClosed)="closeContextMenu($event.restoreFocus)"
    />
  }
}
