<button
  type="button"
  class="rail-button"
  [class.rail-button--active]="active"
  [attr.data-testid]="testId"
  [attr.aria-label]="tooltipText"
  [attr.aria-haspopup]="menuExpanded === null ? null : 'menu'"
  [attr.aria-expanded]="menuExpanded"
  (click)="clicked.emit()"
>
  <svg class="rail-button__icon" viewBox="0 0 24 24" aria-hidden="true">
    @for (path of paths; track path) {
      <path [attr.d]="path" />
    }
  </svg>
  <span class="rail-button__tooltip" aria-hidden="true">{{ tooltipText }}</span>
</button>
