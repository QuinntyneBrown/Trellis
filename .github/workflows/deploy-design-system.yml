name: Deploy design system

# Publishes docs/mocks/design-system to the Trellis Design System
# Azure Static Web App. The site is plain static HTML/CSS/JS, so the
# deploy skips the app build entirely.
#
# Required repository secret:
#   AZURE_STATIC_WEB_APPS_API_TOKEN — deployment token of the Static Web
#   App provisioned by infra/design-system.bicep (Azure portal → the SWA
#   resource → Manage deployment token).

on:
  push:
    branches: [main]
    paths:
      - "docs/mocks/design-system/**"
      - ".github/workflows/deploy-design-system.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Azure Static Web Apps
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: docs/mocks/design-system
          output_location: ""
          skip_app_build: true
